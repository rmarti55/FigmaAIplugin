<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font: 12px sans-serif;
      margin: 20px;
    }
    #prompt {
      width: 100%;
      height: 60px;
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: none;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #18A0FB;
      border: none;
      border-radius: 4px;
      color: white;
      font-weight: 500;
      cursor: pointer;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    .error {
      background: #ffd7d7;
      color: #d32f2f;
    }
    .success {
      background: #dcedc8;
      color: #33691e;
    }
    .examples {
      margin-top: 20px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <textarea id="prompt" placeholder="Describe your layout...
Example: Create a login form with a title, two input fields for email and password, and a submit button"></textarea>
  <button id="generate">Generate Layout</button>
  <div id="status"></div>
  <div class="examples">
    <p><strong>Example prompts:</strong></p>
    <ul>
      <li>Create a card with an image placeholder, title, and description</li>
      <li>Make a navigation bar with a logo and three menu items</li>
      <li>Design a pricing section with three columns</li>
    </ul>
  </div>
  <script>
    document.getElementById('generate').onclick = () => {
      const prompt = document.getElementById('prompt').value;
      const status = document.getElementById('status');
      const button = document.getElementById('generate');
      
      if (!prompt) {
        status.textContent = 'Please enter a prompt';
        status.className = 'error';
        return;
      }

      status.textContent = 'Generating layout...';
      status.className = '';
      button.disabled = true;

      parent.postMessage({ pluginMessage: { type: 'generate-layout', prompt } }, '*');
    }

    onmessage = (event) => {
      const message = event.data.pluginMessage;
      const status = document.getElementById('status');
      const button = document.getElementById('generate');

      if (message.type === 'error') {
        status.textContent = message.message;
        status.className = 'error';
      } else if (message.type === 'success') {
        status.textContent = 'Layout generated successfully!';
        status.className = 'success';
      }

      button.disabled = false;
    }
  </script>
</body>
</html>
